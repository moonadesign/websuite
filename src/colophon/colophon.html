<section class="layer">
  <div class="layer-inset">
    <h2>Colophon</h2>
  </div>
</section>

<section class="layer">
  <div class="layer-inset">
    <div class="masonry">
      <div class="tile">
        <h3>Fonts</h3>
        <p class="font-sample font-bold">DM Sans Bold</p>
        <p class="font-sample">DM Sans Medium</p>
      </div>

      <div class="tile">
        <h3>Colors</h3>
        <div class="row">
          <div class="swatch swatch-darkest"></div>
          <div class="swatch swatch-darker"></div>
          <div class="swatch swatch-half"></div>
          <div class="swatch swatch-light"></div>
          <div class="swatch swatch-lighter"></div>
          <div class="swatch swatch-lightest"></div>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="layer">
  <div class="layer-inset">
    <h2>Minterface</h2>
  </div>
</section>

<section id="minterface" class="layer">
  <div class="layer-inset">
    <div class="browser">
      <div class="browser-bar"></div>
      <div class="browser-viewport">
        <div class="app-shell">
          <div class="app-header">
            <div class="brand">
              <i class="fa-solid fa-square-0"></i>
              Nothing
            </div>
            <nav>
              <button class="button">
                <i class="fa-regular fa-building"></i>
                <span>Workspace</span>
                <i class="fa-solid fa-angle-down"></i>
              </button>
              <button class="button">
                <i class="fa-regular fa-briefcase"></i>
                <span>Client</span>
                <i class="fa-solid fa-angle-down"></i>
              </button>
              <button class="button">
                <i class="fa-regular fa-folder"></i>
                <span>Project</span>
                <i class="fa-solid fa-angle-down"></i>
              </button>
            </nav>
            <div class="fill"></div>
            <div class="search">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="text" placeholder="Search..." />
            </div>
            <img class="avatar" src="https://i.pravatar.cc/32" alt="Avatar" />
          </div>
          <div class="app-body">
            <aside class="app-sidebar">
              <div class="nav-group">
                <button class="button invert">
                  <i class="fa-regular fa-house"></i>
                  <span class="fill">Dashboard</span>
                </button>
                <button class="button">
                  <i class="fa-regular fa-gear"></i>
                  <span class="fill">Settings</span>
                </button>
                <button class="button">
                  <i class="fa-regular fa-user"></i>
                  <span class="fill">Profile</span>
                </button>
              </div>
            </aside>
            <main class="app-main">
              <aside class="app-rail">
                <div class="nav-group">
                  <button class="button">
                    <i class="fa-regular fa-folder"></i>
                    <span class="fill">Projects</span>
                  </button>
                  <button class="button">
                    <i class="fa-regular fa-star"></i>
                    <span class="fill">Favorites</span>
                  </button>
                </div>
                <hr class="separator" />
                <div class="nav-group">
                  <button class="button">
                    <i class="fa-regular fa-filter"></i>
                    <span class="fill">Filter 1</span>
                  </button>
                  <button class="button">
                    <i class="fa-regular fa-filter"></i>
                    <span class="fill">Filter 2</span>
                  </button>
                </div>
              </aside>
              <div class="app-document">
                <div class="stack">
                  <nav class="breadcrumb inline-links">
                    <button class="button button-icon"><i class="fa-regular fa-house"></i></button>
                    <i class="fa-solid fa-angle-right"></i>
                    <a class="button button-link" href="#">Projects</a>
                    <i class="fa-solid fa-angle-right"></i>
                    <span style="color: var(--color-half)">Overview</span>
                  </nav>
                  <h1>Heading 1</h1>
                  <h2>Heading 2</h2>
                  <h3>Heading 3</h3>
                  <p>Body with <a href="#">link</a>, <strong>bold</strong>, <em>italic</em>.</p>
                  <nav class="tab-bar">
                    <button class="tab active">Overview</button>
                    <button class="tab">Analytics</button>
                    <button class="tab">Settings</button>
                  </nav>
                  <div class="row">
                    <button class="button">Default</button>
                    <button class="button button-primary">Primary</button>
                    <button class="button button-outline">Outline</button>
                  </div>
                  <div class="row">
                    <div class="button-group">
                      <button class="button">List</button>
                      <button class="button active">Grid</button>
                    </div>
                    <div class="toggle-group">
                      <button class="toggle" aria-pressed="false"><i class="fa-regular fa-bold"></i></button>
                      <button class="toggle" aria-pressed="true"><i class="fa-regular fa-italic"></i></button>
                      <button class="toggle" aria-pressed="false"><i class="fa-regular fa-underline"></i></button>
                    </div>
                    <button class="toggle" aria-pressed="false"><i class="fa-regular fa-heart"></i></button>
                  </div>
                  <div class="row">
                    <span class="badge">New</span>
                    <span class="badge">Beta</span>
                    <span class="badge">Pro</span>
                  </div>
                  <div class="skeleton" style="height: 2rem; width: 12rem"></div>
                  <div class="user-item">
                    <img src="https://i.pravatar.cc/100" alt="Avatar" />
                    <div>
                      <h4>User Name</h4>
                      <p>user@example.com</p>
                    </div>
                  </div>
                  <div class="card">
                    <div class="card-header">
                      <h3>Card</h3>
                    </div>
                    <div class="card-section">
                      <p>Content here.</p>
                    </div>
                    <div class="card-footer">
                      <button class="button button-primary">Action</button>
                    </div>
                  </div>
                </div>
              </div>
              <aside class="app-panels">
                <div class="app-panel">
                  <h3>Form</h3>
                  <div class="stack">
                    <div class="field" role="group">
                      <label for="col-name">Name</label>
                      <input id="col-name" placeholder="shadcn" />
                    </div>
                    <div class="otp-group">
                      <input inputmode="numeric" maxlength="1" size="1" />
                      <input inputmode="numeric" maxlength="1" size="1" />
                      <input inputmode="numeric" maxlength="1" size="1" />
                      <input inputmode="numeric" maxlength="1" size="1" />
                      <input inputmode="numeric" maxlength="1" size="1" />
                      <input inputmode="numeric" maxlength="1" size="1" />
                    </div>
                    <div class="row">
                      <select>
                        <option>Select</option>
                      </select>
                      <label><input type="checkbox" /> Check</label>
                    </div>
                    <div class="row">
                      <label><input type="radio" name="r" /> Option 1</label>
                      <label><input type="radio" name="r" /> Option 2</label>
                    </div>
                    <input type="range" min="0" max="100" value="50" />
                    <textarea placeholder="Notes" rows="2"></textarea>
                    <div class="row">
                      <label>
                        <button class="switch" role="switch" aria-checked="false"></button>
                        Off
                      </label>
                      <label>
                        <button class="switch" role="switch" aria-checked="true"></button>
                        On
                      </label>
                    </div>
                    <button class="button button-primary">Submit</button>
                  </div>
                </div>
                <div class="app-panel">
                  <h3>Chat</h3>
                  <div class="stack">
                    <div class="bubble">Hello!</div>
                    <div class="bubble bubble-right">Hi there</div>
                    <div class="bubble">How can I help?</div>
                  </div>
                </div>
              </aside>
            </main>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
