<main id="minterface-page">
  <section id="minterface-type">
    <h1>Heading 32</h1>
    <h2>Heading 24</h2>
    <h3>Heading 20</h3>
    <h4>Heading 16</h4>
    <p>Text <span id="minterface-underline">Underline</span></p>
    <div id="minterface-tools">
      <button class="button button-icon" type="button"><i class="fa-regular fa-circle-plus"></i></button>
      <button class="button button-icon" type="button"><i class="fa-regular fa-plus"></i></button>
      <button class="button button-icon" type="button"><i class="fa-regular fa-angle-down"></i></button>
      <button class="button button-icon" type="button"><i class="fa-regular fa-droplet"></i></button>
      <button class="button button-icon" type="button"><i class="fa-regular fa-check"></i></button>
    </div>
    <div id="minterface-swatches">
      <span class="swatch swatch-lightest"></span>
      <span class="swatch swatch-light"></span>
      <span class="swatch swatch-half"></span>
      <span class="swatch swatch-darker"></span>
      <span class="swatch swatch-darkest"></span>
    </div>
  </section>

  <h2 id="minterface-mark">minterface</h2>

  <section id="minterface-share" class="card">
    <div class="card-section">
      <h2>Share this document</h2>
      <p>Anyone with the link can view this document.</p>
      <div id="minterface-link-row">
        <input id="share-link" type="text" value="https://moona.design" />
        <button class="button button-outline" type="button"><i class="fa-regular fa-xmark"></i></button>
        <button class="button" type="button">Copy link</button>
      </div>
      <h4>Members with access</h4>
      <div id="minterface-member" class="user-item">
        <img
          alt="User avatar"
          src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=80&q=80"
        />
        <div class="fill stack">
          <strong>User Name</strong>
          <p>example@email.com</p>
        </div>
        <select id="minterface-owner" name="owner">
          <option>Project owner</option>
        </select>
      </div>
    </div>
  </section>

  <section id="minterface-pay" class="card">
    <div class="card-section">
      <button class="button button-outline" type="button"><i class="fa-brands fa-google"></i>Sign in</button>
      <button class="button button-primary" type="button"><i class="fa-brands fa-apple"></i>Pay</button>
      <span class="fill"></span>
      <button class="button" id="minterface-cancel" type="button">Cancel</button>
      <button class="button button-primary" type="button">Submit</button>
    </div>
  </section>

  <section id="minterface-chat" class="card">
    <div class="card-section">
      <h2>Chat with us</h2>
      <span class="bubble">How can I help you?</span>
      <span class="bubble bubble-right">how long is the wait for 5</span>
      <div class="row">
        <div class="fill search">
          <i class="fa-regular fa-circle-plus"></i>
          <input id="chat-message" placeholder="Type your message here" type="text" />
          <i class="fa-regular fa-microphone"></i>
        </div>
        <button class="button button-outline" type="button"><i class="fa-regular fa-paper-plane-top"></i></button>
      </div>
    </div>
  </section>
</main>
