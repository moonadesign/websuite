<section class="layer">
  <div class="layer-inset">
    <h1>LinkedIn</h1>
    <p>Profile sidebar and feed layout reproduction.</p>
  </div>
</section>

<section class="layer">
  <div class="layer-inset">
    <div class="app-shell">
      <div class="app-header">
        <i class="fa-brands fa-linkedin li-logo"></i>
        <div class="search li-search">
          <i class="fa-regular fa-search"></i>
          <input placeholder="Search" />
        </div>
        <div class="fill"></div>
        <div class="button"><i class="fa-solid fa-home"></i></div>
        <div class="button"><i class="fa-solid fa-user-group"></i></div>
        <div class="button"><i class="fa-solid fa-briefcase"></i></div>
        <div class="button"><i class="fa-solid fa-message-dots"></i></div>
        <div class="button"><i class="fa-solid fa-bell"></i></div>
      </div>
      <div class="app-body li-body">
        <div class="stack li-sidebar">
          <div class="card">
            <div class="li-banner"></div>
            <div class="card-section li-profile">
              <img alt="Your Name" class="li-avatar" src="https://i.pravatar.cc/56?u=linkedin" />
              <h4>Your Name</h4>
              <p class="muted">Notes about you.</p>
            </div>
            <div class="card-footer li-stats">
              <div class="row"><span class="fill muted">Profile viewers</span> <b>1,234</b></div>
              <div class="row"><span class="fill muted">Post impressions</span> <b>56,789</b></div>
            </div>
          </div>
        </div>
        <div class="skeleton fill"></div>
        <div class="skeleton li-sidebar"></div>
      </div>
    </div>
  </div>
</section>
