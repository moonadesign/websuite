<section class="layer">
  <div class="layer-inset">
    <h1>Admin</h1>
    <p>Sidebar navigation with approvals table inspired by HumanLayer.</p>
  </div>
</section>

<section class="layer">
  <div class="layer-inset">
    <div class="app-shell">
      <div class="app-body">
        <div class="app-panel admin-nav">
          <div class="nav-button"><i class="fa-regular fa-play"></i> Get started</div>
          <div class="nav-button active"><i class="fa-regular fa-check"></i> Approvals</div>
          <div class="nav-button"><i class="fa-regular fa-gear"></i> Settings</div>
          <div class="fill"></div>
          <div class="nav-button"><i class="fa-regular fa-book"></i> Docs</div>
          <div class="nav-button"><i class="fa-regular fa-life-ring"></i> Help</div>
        </div>
        <div class="app-panel">
          <h3>Approvals</h3>
          <table>
            <thead>
              <tr>
                <th>Function Name</th>
                <th>kwargs</th>
                <th>Requested</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><code>example_function</code></td>
                <td><code>{"param1": "value1"}</code></td>
                <td>2 hours ago</td>
                <td><i class="fa-regular fa-stopwatch"></i></td>
              </tr>
              <tr>
                <td><code>send_email</code></td>
                <td><code>{"to": "user@test.com"}</code></td>
                <td>5 hours ago</td>
                <td><i class="fa-regular fa-check status-done"></i></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</section>
