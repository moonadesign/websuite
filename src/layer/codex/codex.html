<section class="layer">
  <div class="layer-inset">
    <h1>Codex</h1>
    <p>Codex-style sidebar shell with folders, threads, and project actions.</p>
  </div>
</section>

<section class="layer">
  <div class="layer-inset">
    <div class="mac-app">
      <header class="mac-app-top">
        <div class="mac-app-lights"><span></span><span></span><span></span></div>
        <i aria-label="Toggle sidebar" class="fa-regular fa-sidebar" data-sidebar-toggle role="button" tabindex="0"></i>
      </header>
      <aside class="mac-app-side">
        <div class="nav-button active"><i class="fa-regular fa-pen-to-square"></i> New thread</div>
        <div class="nav-button"><i class="fa-regular fa-clock"></i> Automations</div>
        <div class="nav-button"><i class="fa-regular fa-grid-2"></i> Skills</div>
        <div class="codex-threads">
          <span>Threads</span>
          <button class="button"><i class="fa-regular fa-folder-plus"></i></button>
          <button class="button"><i class="fa-regular fa-bars-filter"></i></button>
        </div>
        <div class="nav-button"><i class="fa-regular fa-folder-open"></i> Folder</div>
        <div class="nav-button codex-thread">
          <span class="fill">Example thread</span><span class="codex-time">1m</span>
        </div>
        <div class="nav-button"><i class="fa-regular fa-folder"></i> Playground</div>
        <div class="codex-empty">No threads</div>
        <div class="nav-button"><i class="fa-regular fa-folder-plus"></i> Add project</div>
        <div class="fill"></div>
        <div class="nav-button"><i class="fa-regular fa-gear"></i> Settings</div>
      </aside>
      <main class="mac-app-main">
        <div class="skeleton fill"></div>
      </main>
    </div>
  </div>
</section>
