<section class="layer applit">
  <div class="layer-inset stack">
    <h1>Applit</h1>
    <p>
      Frame primitives for product previews. Validate centering, width fill, and edge alignment with nearby content.
    </p>
    <div class="row applit-controls">
      <button class="button button-primary" data-frame="browser" type="button">Browser</button>
      <button class="button button-outline" data-frame="mac-app" type="button">Mac app</button>
    </div>
    <div class="browser">
      <div class="browser-bar"></div>
      <div class="browser-viewport"></div>
    </div>
    <div class="mac-app" hidden>
      <header class="mac-app-top">
        <div class="mac-app-lights"><span></span><span></span><span></span></div>
        <i aria-label="Toggle sidebar" class="fa-regular fa-sidebar" data-sidebar-toggle role="button" tabindex="0"></i>
      </header>
      <div class="mac-app-side"></div>
      <main class="mac-app-main"></main>
    </div>
  </div>
</section>
