<!--
  Grid library options under evaluation:

  AG Grid (https://www.ag-grid.com)
  - Most feature-rich, enterprise-grade
  - Heavy bundle size, commercial license for advanced features

  Handsontable (https://handsontable.com)
  - Spreadsheet-like UX, closest to Excel
  - Commercial license required for production

  RevoGrid (https://rv-grid.com)
  - Virtual DOM, lightweight, good performance
  - Smaller community

  Jspreadsheet (https://jspreadsheet.com)
  - Lightweight spreadsheet component
  - Free tier available

  Key concerns:
  - Performance at scale (https://dev.to/revolist/battle-of-the-rows-the-limits-of-data-performance-4mcn)
  - Static HTML vs React compatibility
  - License cost
  - Bundle size — must stay lightweight
-->
