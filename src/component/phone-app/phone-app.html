<section class="layer">
  <div class="layer-inset">
    <h1>Phone app</h1>
    <p>iPhone-inspired mobile app preview shell with reusable view stubs.</p>
    <div id="phone-sizes">
      <button class="button-outline" data-phone-size="20remx35rem" type="button">iPhone 5</button>
      <button class="active button-outline" data-phone-size="24remx48rem" type="button">iPhone X</button>
      <button class="button-outline" data-phone-size="24remx52rem" type="button">iPhone 12</button>
      <button class="button-outline" data-phone-size="25remx56rem" type="button">iPhone Plus</button>
    </div>
  </div>
</section>

<section class="layer">
  <div class="layer-inset">
    <h2>Shells</h2>
    <div class="phone-group">
      <article class="phone-variant">
        <h3>Clean</h3>
        <div class="phone-shell">
          <div class="phone-status">
            <span class="phone-status-time" data-clock>9:41</span>
            <span class="phone-island"></span>
            <span class="phone-status-icons"
              ><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i
            ></span>
          </div>
          <div class="phone-page"></div>
          <div class="phone-swipe"><span></span></div>
        </div>
      </article>
      <article class="phone-variant">
        <h3>Outline</h3>
        <div class="phone-shell phone-shell-outline">
          <div class="phone-status">
            <span class="phone-status-time" data-clock>9:41</span>
            <span class="phone-island"></span>
            <span class="phone-status-icons"
              ><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i
            ></span>
          </div>
          <div class="phone-page"></div>
          <div class="phone-swipe"><span></span></div>
        </div>
      </article>
      <article class="phone-variant">
        <h3>Bezel</h3>
        <div class="phone-shell phone-shell-bezel">
          <div class="phone-status">
            <span class="phone-status-time" data-clock>9:41</span>
            <span class="phone-island"></span>
            <span class="phone-status-icons"
              ><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i
            ></span>
          </div>
          <div class="phone-page"></div>
          <div class="phone-swipe"><span></span></div>
        </div>
      </article>
    </div>
  </div>
</section>

<section class="layer">
  <div class="layer-inset">
    <h2>Examples</h2>
    <div class="phone-group">
      <article class="phone-variant">
        <h3>Glass</h3>
        <div class="glass phone-shell phone-shell-glass phone-shell-outline">
          <div class="phone-status">
            <span class="phone-status-time">Carrier</span>
            <span class="phone-island"></span>
            <span class="phone-status-icons"
              ><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i
            ></span>
          </div>
          <div class="phone-page"><div class="phone-glass-time" data-clock>9:41</div></div>
          <div class="phone-swipe"><span></span></div>
        </div>
      </article>
      <article class="phone-variant">
        <h3>Tabs</h3>
        <div class="phone-shell phone-shell-outline">
          <div class="phone-status">
            <span class="phone-status-time" data-clock>9:41</span>
            <span class="phone-island"></span>
            <span class="phone-status-icons"
              ><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i
            ></span>
          </div>
          <div class="phone-page"></div>
          <div class="phone-tabs">
            <button class="phone-tab active" type="button"><i class="fa-solid fa-house"></i><span>Home</span></button>
            <button class="phone-tab" type="button">
              <i class="fa-solid fa-magnifying-glass"></i><span>Explore</span>
            </button>
            <button class="phone-tab" type="button"><i class="fa-solid fa-map"></i><span>Map</span></button>
            <button class="phone-tab" type="button"><i class="fa-solid fa-comment"></i><span>Chat</span></button>
            <button class="phone-tab" type="button"><i class="fa-solid fa-user"></i><span>Profile</span></button>
          </div>
          <div class="phone-swipe"><span></span></div>
        </div>
      </article>
      <article class="phone-variant">
        <h3>Contacts</h3>
        <div class="phone-shell phone-shell-outline">
          <div class="phone-status">
            <span class="phone-status-time" data-clock>9:41</span>
            <span class="phone-island"></span>
            <span class="phone-status-icons"
              ><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i
            ></span>
          </div>
          <div class="phone-page"></div>
          <div class="phone-swipe"><span></span></div>
        </div>
      </article>
      <article class="phone-variant">
        <h3>Call</h3>
        <div class="glass phone-shell phone-shell-call phone-shell-glass">
          <div class="phone-shell-blur"></div>
          <div class="phone-status">
            <span class="phone-status-time" data-clock>9:41</span>
            <span class="phone-island"></span>
            <span class="phone-status-icons"
              ><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i
            ></span>
          </div>
          <div class="phone-page phone-page-call">
            <div class="phone-call-head">
              <div data-call-timer>00:00</div>
              <h2>+1 (312) 555-0086</h2>
            </div>
            <div class="phone-call-actions">
              <button class="phone-call-action" type="button">
                <i class="fa-solid fa-volume-high"></i><span>Speaker</span>
              </button>
              <button class="phone-call-action" type="button">
                <i class="fa-solid fa-video"></i><span>FaceTime</span>
              </button>
              <button class="phone-call-action" type="button">
                <i class="fa-solid fa-microphone-slash"></i><span>Mute</span>
              </button>
              <button class="phone-call-action" type="button">
                <i class="fa-solid fa-ellipsis"></i><span>More</span>
              </button>
              <button class="phone-call-action end" type="button">
                <i class="fa-solid fa-phone"></i><span>End</span>
              </button>
              <button class="phone-call-action" type="button">
                <i class="fa-solid fa-grid"></i><span>Keypad</span>
              </button>
            </div>
          </div>
          <div class="phone-swipe"><span></span></div>
        </div>
      </article>
      <article class="phone-variant">
        <h3>FaceTime</h3>
        <div class="glass phone-shell phone-shell-call">
          <video
            autoplay
            class="phone-facetime-video"
            loop
            muted
            playsinline
            src="https://videos.pexels.com/video-files/4990426/4990426-hd_1080_1920_30fps.mp4"
          ></video>
          <div class="phone-status">
            <span class="phone-status-time" data-clock>9:41</span>
            <span class="phone-island"></span>
            <span class="phone-status-icons"
              ><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i
            ></span>
          </div>
          <div class="phone-page phone-page-call">
            <div class="phone-call-head">
              <div data-call-timer>00:00</div>
              <h2>+1 (312) 555-0086</h2>
            </div>
            <div class="phone-call-actions">
              <button class="phone-call-action" type="button">
                <i class="fa-solid fa-volume-high"></i><span>Speaker</span>
              </button>
              <button class="phone-call-action" type="button">
                <i class="fa-solid fa-video"></i><span>FaceTime</span>
              </button>
              <button class="phone-call-action" type="button">
                <i class="fa-solid fa-microphone-slash"></i><span>Mute</span>
              </button>
              <button class="phone-call-action" type="button">
                <i class="fa-solid fa-ellipsis"></i><span>More</span>
              </button>
              <button class="phone-call-action end" type="button">
                <i class="fa-solid fa-phone"></i><span>End</span>
              </button>
              <button class="phone-call-action" type="button">
                <i class="fa-solid fa-grid"></i><span>Keypad</span>
              </button>
            </div>
          </div>
          <div class="phone-swipe"><span></span></div>
        </div>
      </article>
      <article class="phone-variant">
        <h3>Messages</h3>
        <div class="phone-shell phone-shell-outline">
          <div class="phone-status">
            <span class="phone-status-time" data-clock>9:41</span>
            <span class="phone-island"></span>
            <span class="phone-status-icons"
              ><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i
            ></span>
          </div>
          <div class="phone-page"></div>
          <div class="phone-swipe"><span></span></div>
        </div>
      </article>
    </div>
  </div>
</section>
