<section class="layer">
  <div class="layer-inset">
    <h1>Toolbar</h1>
    <p>Button groups, toggles, pagination, tabs, and separators.</p>
  </div>
</section>

<section class="layer">
  <div class="layer-inset">
    <h2>Button Group</h2>
    <div class="row">
      <div class="button-group">
        <button class="button"><i class="fa-regular fa-list"></i> List</button>
        <button class="button active"><i class="fa-regular fa-grid-2"></i> Grid</button>
      </div>
      <div class="button-group">
        <button class="button">Day</button>
        <button class="button active">Week</button>
        <button class="button">Month</button>
      </div>
    </div>
    <div class="row compact">
      <div class="button-group">
        <button class="button"><i class="fa-regular fa-list"></i> List</button>
        <button class="button active"><i class="fa-regular fa-grid-2"></i> Grid</button>
      </div>
      <div class="button-group">
        <button class="button">Day</button>
        <button class="button active">Week</button>
        <button class="button">Month</button>
      </div>
    </div>

    <h2>Toggle</h2>
    <div class="row">
      <button class="toggle" aria-pressed="false"><i class="fa-regular fa-heart"></i> Favorite</button>
    </div>
    <div class="row compact">
      <button class="toggle" aria-pressed="false"><i class="fa-regular fa-heart"></i> Favorite</button>
    </div>

    <h2>Toggle Group</h2>
    <div class="row">
      <div class="toggle-group">
        <button class="toggle" aria-pressed="false"><i class="fa-regular fa-bold"></i></button>
        <button class="toggle" aria-pressed="true"><i class="fa-regular fa-italic"></i></button>
        <button class="toggle" aria-pressed="false"><i class="fa-regular fa-underline"></i></button>
      </div>
    </div>
    <div class="row compact">
      <div class="toggle-group">
        <button class="toggle" aria-pressed="false"><i class="fa-regular fa-bold"></i></button>
        <button class="toggle" aria-pressed="true"><i class="fa-regular fa-italic"></i></button>
        <button class="toggle" aria-pressed="false"><i class="fa-regular fa-underline"></i></button>
      </div>
    </div>

    <h2>Pagination</h2>
    <nav class="row pagination">
      <button class="button button-outline"><i class="fa-regular fa-angle-left"></i> Previous</button>
      <button class="button button-outline">1</button>
      <button class="button button-primary">2</button>
      <button class="button button-outline">3</button>
      <button class="button button-outline">Next <i class="fa-regular fa-angle-right"></i></button>
    </nav>

    <h2>Tabs</h2>
    <div class="row">
      <nav class="tab-bar">
        <button class="tab active">Overview</button>
        <button class="tab">Analytics</button>
        <button class="tab">Reports</button>
        <button class="tab">Settings</button>
      </nav>
      <nav class="tab-bar vertical">
        <button class="tab active">Overview</button>
        <button class="tab">Analytics</button>
        <button class="tab">Reports</button>
        <button class="tab">Settings</button>
      </nav>
      <nav class="tab-bar line">
        <button class="tab active">Overview</button>
        <button class="tab">Analytics</button>
        <button class="tab">Reports</button>
        <button class="tab">Settings</button>
      </nav>
    </div>
    <div class="row compact">
      <nav class="tab-bar">
        <button class="tab active">Overview</button>
        <button class="tab">Analytics</button>
        <button class="tab">Reports</button>
        <button class="tab">Settings</button>
      </nav>
      <nav class="tab-bar vertical">
        <button class="tab active">Overview</button>
        <button class="tab">Analytics</button>
        <button class="tab">Reports</button>
        <button class="tab">Settings</button>
      </nav>
      <nav class="tab-bar line">
        <button class="tab active">Overview</button>
        <button class="tab">Analytics</button>
        <button class="tab">Reports</button>
        <button class="tab">Settings</button>
      </nav>
    </div>

    <h2>Separator</h2>
    <div class="row separator-row">
      <span>Text A</span>
      <hr class="separator" />
      <span>Text B</span>
    </div>
  </div>
</section>
